<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Ghost</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👻</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .danger-bg { background: radial-gradient(circle at top left, #450a0a, #1a0505, #000000) !important; color: #fee2e2 !important; }
        .danger-card { background: rgba(0, 0, 0, 0.5) !important; border: 1px solid rgba(220, 38, 38, 0.6) !important; box-shadow: 0 0 40px rgba(239, 68, 68, 0.4) !important; }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 32px; }
        
        #laser { position: fixed; top: -10px; left: 0; width: 100%; height: 4px; background: #ef4444; box-shadow: 0 0 20px #ef4444; z-index: 100; display: none; }
        .animate-scan { animation: scan 0.8s linear forwards; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #reader { width: 100%; border-radius: 24px; overflow: hidden; border: none !important; }
        #reader video { border-radius: 24px !important; object-fit: cover !important; }
        
        canvas#shareCanvas { display: none; }
        
        .icon-pop { animation: pop 0.2s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body id="mainBody" class="p-4 md:p-12 text-slate-900 bg-slate-100 transition-colors duration-700">

    <div id="laser" aria-hidden="true"></div>
    <canvas id="shareCanvas" width="1080" height="1920"></canvas>

    <div class="max-w-xl mx-auto space-y-8 relative z-10">
        
        <!-- LOGO -->
        <header class="text-center mb-8">
            <div onclick="location.reload()" class="cursor-pointer inline-block transform transition-all hover:scale-105 active:scale-95 group" role="button">
                <h1 class="text-6xl font-black tracking-tighter leading-none">
                    <span class="text-slate-800">Sugar</span><span class="text-red-600">Ghost</span>
                </h1>
                <p class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-400 mt-2 transition-colors group-hover:text-red-500 text-center">
                    Laboratoryjny Skaner Składu
                </p>
            </div>
        </header>

        <!-- SKANER -->
        <section class="glass-card p-4 shadow-xl border-2 border-dashed border-blue-400/30">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xs font-black uppercase tracking-widest text-blue-600">Skaner Aparatu</h2>
                <div id="apiStatus" class="text-[10px] font-bold text-slate-400 uppercase italic">Gotowy</div>
            </div>
            <div id="reader"></div>
            <button id="startCamBtn" onclick="startScanner()" class="w-full mt-4 py-4 bg-blue-600 text-white rounded-2xl font-black text-sm tracking-widest shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                <span>URUCHOM APARAT</span> 📷
            </button>
        </section>

        <!-- FORMULARZ -->
        <main class="glass-card p-8 shadow-2xl space-y-6" id="mainInputCard">
            <div class="flex p-1 bg-slate-200/50 rounded-2xl">
                <button id="toggleFood" onclick="setUnit('food')" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all bg-slate-900 text-white">Jedzenie (g)</button>
                <button id="toggleDrink" onclick="setUnit('drink')" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-400">Napoje (ml)</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label for="prodName" class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50">Nazwa produktu</label>
                    <input type="text" id="prodName" onfocus="this.select()" oninput="resetUI()" placeholder="np. Baton, Jogurt" 
                        class="w-full bg-white/50 border-none rounded-2xl p-4 text-lg font-bold focus:ring-4 focus:ring-red-100 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="sugarPer100" id="labelSugar" class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50">Cukier / 100g</label>
                        <input type="number" id="sugarPer100" inputmode="decimal" onfocus="this.select()" oninput="resetUI()" placeholder="0" min="0" step="0.1"
                            class="w-full bg-white/50 border-none rounded-2xl p-4 text-xl font-bold focus:ring-4 focus:ring-red-100 outline-none transition-all">
                    </div>
                    <div>
                        <label for="totalWeight" id="labelWeight" class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50">Waga produktu (g)</label>
                        <input type="number" id="totalWeight" inputmode="decimal" onfocus="this.select()" oninput="resetUI()" placeholder="0" min="0"
                            class="w-full bg-white/50 border-none rounded-2xl p-4 text-xl font-bold focus:ring-4 focus:ring-red-100 outline-none transition-all">
                    </div>
                </div>
            </div>

            <div id="quickWeights" class="flex gap-2"></div>

            <button id="scanBtn" onclick="initScan()" class="w-full py-6 bg-slate-900 text-white rounded-2xl font-black text-xl tracking-widest shadow-md hover:shadow-xl active:scale-95 transition-all">
                PRZEŚWIETL PRODUKT 👻
            </button>
            <p id="errorBox" class="hidden text-red-600 text-[10px] font-bold text-center uppercase tracking-widest animate-pulse"></p>
        </main>

        <!-- WYNIKI -->
        <section id="results" class="hidden space-y-6">
            <div id="resultCard" class="glass-card p-8 shadow-2xl text-center space-y-10 transition-all duration-500">
                <div class="space-y-2">
                    <div id="ghostEmoji" class="text-8xl">😇</div>
                    <h2 id="resName" class="text-2xl font-black uppercase tracking-tighter text-inherit">Produkt</h2>
                    <p id="ghostComment" class="text-sm italic font-medium opacity-70 px-4"></p>
                </div>

                <div class="space-y-6">
                    <div>
                        <span id="totalGrams" class="text-7xl font-black tracking-tighter">0g</span>
                        <div id="sugarKcal" class="text-lg font-bold opacity-60 mt-1 text-inherit">Energia z cukru: 0 kcal</div>
                    </div>

                    <div class="space-y-2 px-2">
                        <div class="flex justify-between text-[10px] font-black uppercase tracking-widest">
                            <span>Limit dla tego produktu (50g)</span>
                            <span id="limitPercent">0%</span>
                        </div>
                        <div class="w-full bg-black/10 h-6 rounded-full overflow-hidden p-1 shadow-inner">
                            <div id="limitBar" class="h-full rounded-full transition-all duration-1000 bg-emerald-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="grid gap-4 text-left">
                    <div class="bg-white/20 p-6 rounded-3xl">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-3 text-center">Wizualizacja porcji (łyżeczki 5g)</p>
                        <div id="spoonRow" class="flex flex-wrap justify-center gap-2 min-h-[30px]"></div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-black/5 p-4 rounded-2xl"><div class="text-2xl">🍩</div><div id="donutVal" class="text-lg font-black text-inherit">0</div><div class="text-[8px] font-bold uppercase opacity-50 text-center">Pączków</div></div>
                    <div class="bg-black/5 p-4 rounded-2xl text-inherit"><div class="text-2xl">🥤</div><div id="colaVal" class="text-lg font-black text-inherit">0</div><div class="text-[8px] font-bold uppercase opacity-50 text-center">Coli</div></div>
                    <div class="bg-black/5 p-4 rounded-2xl"><div class="text-2xl">🏃</div><div id="runVal" class="text-lg font-black text-inherit">0 min</div><div class="text-[8px] font-bold uppercase opacity-50 text-inherit text-center">Biegu</div></div>
                </div>

                <button id="shareBtn" onclick="generateSocialImage()" class="w-full py-4 border-2 border-slate-900 text-slate-900 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all">
                    Udostępnij Raport 📲
                </button>
            </div>
        </section>

        <!-- ARCHIWUM -->
        <section id="archiveSection" class="glass-card p-8 shadow-xl space-y-6">
            <div class="flex justify-between items-center border-b border-black/5 pb-4">
                <h3 class="text-xs font-black uppercase tracking-widest opacity-50" id="archiveHeader">Historia skanowań</h3>
                <button onclick="clearArchive()" class="text-[9px] font-black text-red-500 uppercase hover:underline">Wyczyść</button>
            </div>
            <div id="archiveList" class="space-y-3"></div>
        </section>

        <footer class="text-center text-[10px] font-black uppercase tracking-widest opacity-30 py-10">
            Sugar Ghost &bull; 2026 &bull; System Laboratoryjny 5.5
        </footer>
    </div>

    <script>
        const CONFIG = {
            HISTORY_KEY: 'ghost_v5_history',
            SUGAR_LIMIT: 50,
            GRAMS_PER_SPOON: 5,
            KCAL_PER_GRAM: 4,
            MAX_ICONS: 30
        };

        let currentUnit = 'food';
        let html5QrCode = null;

        const comments = {
            low: ["Czysty skład. Ghost zatwierdza! 🌿", "Idealny wybór. Tak trzymaj!", "Anielsko zdrowe!"],
            mid: ["Słodko... miej oko na resztę dnia. 🤨", "Uważaj na ten produkt.", "Cukrowa pułapka!"],
            high: ["TWOJA TRZUSTKA CHCE URLOPU! 💀", "To nie jedzenie, to syrop.", "WITAMY W FABRYCE PRÓCHNICY! 😱"]
        };

        function setWeight(v) {
            document.getElementById('totalWeight').value = v;
            resetUI();
        }

        function renderQuickButtons() {
            const container = document.getElementById('quickWeights');
            const weights = currentUnit === 'food' ? [100, 150, 400] : [250, 330, 500];
            const suffix = currentUnit === 'food' ? 'g' : 'ml';
            container.innerHTML = weights.map(w => `
                <button onclick="setWeight(${w})" class="flex-1 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold uppercase shadow-md transition-all active:scale-95">${w}${suffix}</button>
            `).join('');
        }

        function resetUI() {
            document.getElementById('results').classList.add('hidden');
            toggleDangerMode(false);
        }

        function setUnit(u) {
            currentUnit = u;
            const isF = u === 'food';
            document.getElementById('toggleFood').className = `flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all ${isF ? 'bg-slate-900 text-white' : 'text-slate-400'}`;
            document.getElementById('toggleDrink').className = `flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all ${!isF ? 'bg-slate-900 text-white' : 'text-slate-400'}`;
            document.getElementById('labelSugar').innerText = isF ? 'Cukier / 100g' : 'Cukier / 100ml';
            document.getElementById('labelWeight').innerText = isF ? 'Waga produktu (g)' : 'Pojemność (ml)';
            renderQuickButtons();
        }

        async function startScanner() {
            const btn = document.getElementById('startCamBtn');
            if (html5QrCode && html5QrCode.getState() === 2) { await html5QrCode.stop(); btn.innerText = "URUCHOM APARAT 📷"; return; }
            btn.innerText = "INICJALIZACJA...";
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 150 }, aspectRatio: 1.77 };
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                btn.innerText = "STOP APARAT ❌";
            } catch (err) { showError("Błąd kamery"); btn.innerText = "URUCHOM APARAT 📷"; }
        }

        async function onScanSuccess(decodedText) {
            if (html5QrCode) await html5QrCode.stop();
            document.getElementById('startCamBtn').innerText = "URUCHOM APARAT 📷";
            document.getElementById('apiStatus').innerText = "Szukam w bazie...";
            
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json?fields=product_name,nutriments,quantity`);
                const data = await res.json();
                if (!data.product) throw new Error();

                const p = data.product;
                document.getElementById('prodName').value = p.product_name || "Nieznany produkt";
                document.getElementById('sugarPer100').value = p.nutriments?.sugars_100g || 0;
                let weight = 100;
                if (p.quantity) {
                    const match = p.quantity.match(/(\d+)/);
                    if (match) weight = parseInt(match[1]);
                }
                document.getElementById('totalWeight').value = weight;
                document.getElementById('apiStatus').innerText = "Znaleziono!";
                initScan();
            } catch (err) { showError("Nie znaleziono produktu."); document.getElementById('apiStatus').innerText = "Gotowy"; }
        }

        function initScan() {
            const sVal = parseFloat(document.getElementById('sugarPer100').value);
            const wVal = parseFloat(document.getElementById('totalWeight').value);
            const nVal = document.getElementById('prodName').value.trim() || "Produkt";

            if (isNaN(sVal) || isNaN(wVal) || sVal < 0) return showError("Wprowadź poprawne dane!");

            const btn = document.getElementById('scanBtn');
            btn.innerText = "SKANOWANIE...";
            const laser = document.getElementById('laser');
            laser.style.display = 'block';
            laser.classList.add('animate-scan');

            setTimeout(() => {
                laser.style.display = 'none';
                laser.classList.remove('animate-scan');
                if (navigator.vibrate) navigator.vibrate(50);
                processAnalysis(nVal, sVal, wVal);
                btn.innerText = "PRZEŚWIETL PRODUKT 👻";
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            }, 800);
        }

        function processAnalysis(name, sugarPer100, weight) {
            const totalG = (sugarPer100 * weight) / 100;
            const percent = Math.round((totalG / CONFIG.SUGAR_LIMIT) * 100);
            const emoji = percent > 100 ? "💀" : (percent > 20 ? "🤨" : "😇");
            const kcal = Math.round(totalG * CONFIG.KCAL_PER_GRAM);

            document.getElementById('resName').innerText = name;
            document.getElementById('totalGrams').innerText = Math.round(totalG) + "g";
            document.getElementById('sugarKcal').innerText = `Energia z cukru: ${kcal} kcal`;
            document.getElementById('limitPercent').innerText = percent + "%";
            
            const bar = document.getElementById('limitBar');
            bar.style.width = Math.min(percent, 100) + "%";
            bar.className = `h-full rounded-full transition-all duration-1000 ${percent > 100 ? 'bg-red-600' : (percent > 40 ? 'bg-amber-500' : 'bg-emerald-500')}`;

            document.getElementById('ghostEmoji').innerText = emoji;
            const cat = percent > 100 ? 'high' : (percent > 20 ? 'mid' : 'low');
            document.getElementById('ghostComment').innerText = comments[cat][Math.floor(Math.random() * comments[cat].length)];

            renderIcons('spoonRow', '🥄', Math.floor(totalG/5));
            document.getElementById('donutVal').innerText = (totalG / 20).toFixed(1);
            document.getElementById('colaVal').innerText = (totalG / 27).toFixed(1);
            document.getElementById('runVal').innerText = Math.round((totalG/5) * 4);

            toggleDangerMode(percent > 100);
            autoSaveToHistory(name, Math.round(totalG), emoji);
        }

        function toggleDangerMode(isD) {
            const b = document.getElementById('mainBody');
            const c = document.getElementById('resultCard');
            if (isD) { b.classList.add('danger-bg'); c.classList.add('danger-card'); } 
            else { b.classList.remove('danger-bg'); c.classList.remove('danger-card'); }
            renderArchive();
        }

        function getValidatedHistory() {
            const today = new Date().toLocaleDateString('pl-PL');
            const raw = localStorage.getItem(CONFIG.HISTORY_KEY);
            let history = raw ? JSON.parse(raw) : [];
            const clean = history.filter(item => item && item.name && item.date === today);
            if (clean.length !== history.length) localStorage.setItem(CONFIG.HISTORY_KEY, JSON.stringify(clean));
            return clean;
        }

        function autoSaveToHistory(name, grams, emoji) {
            const history = getValidatedHistory();
            const now = new Date();
            history.unshift({ name: String(name), grams, emoji, date: now.toLocaleDateString('pl-PL'), time: now.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'}) });
            localStorage.setItem(CONFIG.HISTORY_KEY, JSON.stringify(history.slice(0, 10)));
        }

        function renderArchive() {
            const history = getValidatedHistory();
            const container = document.getElementById('archiveList');
            const isD = document.body.classList.contains('danger-bg');
            if (history.length === 0) { container.innerHTML = '<p class="text-center text-xs opacity-30 py-4 italic text-inherit">Brak skanów</p>'; return; }
            container.innerHTML = '';
            history.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.className = `flex items-center justify-between p-4 rounded-2xl border transition-all ${isD ? 'bg-white/5 border-white/10 text-white' : 'bg-white/20 border-white/30 text-slate-800'}`;
                wrapper.innerHTML = `<div class="flex items-center gap-3"><span class="text-2xl">${item.emoji}</span><div><div class="font-black text-xs uppercase text-inherit">${item.name}</div><div class="text-[9px] font-bold opacity-50 text-inherit">${item.time}</div></div></div><div class="font-black text-red-500">${item.grams}g</div>`;
                container.appendChild(wrapper);
            });
        }

        /**
         * ZAKTUALIZOWANY CANVAS Z OBSŁUGĄ WEB SHARE API I BEZPIECZNYMI FONTAMI
         */
        async function generateSocialImage() {
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            const name = document.getElementById('resName').innerText;
            const grams = document.getElementById('totalGrams').innerText;
            const emoji = document.getElementById('ghostEmoji').innerText;
            const kcal = document.getElementById('sugarKcal').innerText;
            const isD = document.body.classList.contains('danger-bg');
            const shareBtn = document.getElementById('shareBtn');

            shareBtn.innerText = "PRZYGOTOWUJĘ... ⏳";

            // Tło 9:16 - Rysowanie
            const grd = ctx.createLinearGradient(0, 0, 0, 1920);
            if(isD) { grd.addColorStop(0, '#450a0a'); grd.addColorStop(1, '#000000'); } 
            else { grd.addColorStop(0, '#f8fafc'); grd.addColorStop(1, '#e2e8f0'); }
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 1080, 1920);

            // Obramowanie
            ctx.strokeStyle = isD ? '#ef4444' : '#0f172a';
            ctx.lineWidth = 40;
            ctx.strokeRect(20, 20, 1040, 1880);

            // Nagłówek - System font fallback
            ctx.fillStyle = isD ? '#ef4444' : '#1e293b';
            ctx.font = '800 50px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('RAPORT SUGAR GHOST', 540, 350);

            // Duch
            ctx.font = '500px serif';
            ctx.fillText(emoji, 540, 850);

            // Nazwa Produktu
            ctx.fillStyle = isD ? '#ffffff' : '#0f172a';
            ctx.font = 'bold 80px sans-serif';
            ctx.fillText(name.toUpperCase(), 540, 1100);

            // Gramy
            ctx.font = '900 350px sans-serif';
            ctx.fillStyle = '#ef4444';
            ctx.fillText(grams, 540, 1450);

            // Podpis gramów
            ctx.font = 'bold 60px sans-serif';
            ctx.fillStyle = isD ? '#fee2e2' : '#64748b';
            ctx.fillText('CUKRU W PORCJI', 540, 1550);

            // Kalorie
            ctx.font = '50px sans-serif';
            ctx.fillText(kcal, 540, 1650);

            // KONWERSJA NA BLOB I UDOSTĘPNIANIE
            canvas.toBlob(async (blob) => {
                if (!blob) return;
                const file = new File([blob], `SugarGhost_${name}.png`, { type: 'image/png' });

                // Sprawdzenie Web Share API
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Raport Sugar Ghost',
                            text: `Spójrz ile cukru ma ${name}! Prześwietlone przez Sugar Ghost 👻`
                        });
                    } catch (err) {
                        console.log("Anulowano udostępnianie");
                    }
                } else {
                    // Fallback dla komputerów (pobieranie)
                    const link = document.createElement('a');
                    link.download = `SugarGhost_${name}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
                shareBtn.innerText = "Udostępnij Raport 📲";
            }, 'image/png');
        }

        function renderIcons(id, em, count) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            for(let i=0; i<Math.min(count, CONFIG.MAX_ICONS); i++) {
                const s = document.createElement('span');
                s.innerText = em; s.className = 'text-xl icon-pop animate-pulse';
                s.style.animationDelay = (i * 0.05) + 's';
                container.appendChild(s);
            }
            if(count > CONFIG.MAX_ICONS) {
                const rest = document.createElement('span');
                rest.innerText = `+ ${count - CONFIG.MAX_ICONS} więcej`;
                rest.className = 'text-[10px] font-black uppercase opacity-40 ml-2';
                container.appendChild(rest);
            }
        }

        function showError(m) { const b = document.getElementById('errorBox'); b.innerText = m; b.classList.remove('hidden'); setTimeout(() => b.classList.add('hidden'), 3000); }
        function clearArchive() { if(confirm("Wyczyścić?")) { localStorage.removeItem(CONFIG.HISTORY_KEY); renderArchive(); } }

        setUnit('food');
        renderArchive();
    </script>
</body>
</html>
